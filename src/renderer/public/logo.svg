<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 简单笔记 Logo - 主版本 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F8EF7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="paperGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8FAFC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="penGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="248" fill="#FFFFFF"/>
  <circle cx="256" cy="256" r="244" fill="url(#bgGradient)"/>

  <g transform="translate(256, 256)" filter="url(#shadow)">
    <rect x="-100" y="-120" width="180" height="230" rx="12" fill="#E2E8F0" transform="rotate(5)"/>
    <rect x="-110" y="-130" width="180" height="230" rx="12" fill="url(#paperGradient)" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="-110" y="-130" width="24" height="230" rx="12" fill="#F1F5F9"/>
    <rect x="-86" y="-130" width="2" height="230" fill="#CBD5E1"/>
    <circle cx="-98" cy="-90" r="5" fill="#CBD5E1"/>
    <circle cx="-98" cy="-40" r="5" fill="#CBD5E1"/>
    <circle cx="-98" cy="10" r="5" fill="#CBD5E1"/>
    <circle cx="-98" cy="60" r="5" fill="#CBD5E1"/>
    <line x1="-65" y1="-80" x2="50" y2="-80" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
    <line x1="-65" y1="-50" x2="50" y2="-50" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
    <line x1="-65" y1="-20" x2="30" y2="-20" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
    <line x1="-65" y1="10" x2="50" y2="10" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
    <line x1="-65" y1="40" x2="40" y2="40" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
    <line x1="-65" y1="70" x2="20" y2="70" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
    <rect x="-68" y="-88" width="85" height="10" rx="2" fill="#FEF3C7" opacity="0.9"/>
  </g>

  <g transform="translate(256, 256) rotate(-30)" filter="url(#shadow)">
    <rect x="20" y="-180" width="32" height="140" rx="6" fill="url(#penGradient)" stroke="#D97706" stroke-width="1"/>
    <rect x="18" y="-200" width="36" height="30" rx="6" fill="#FCD34D" stroke="#D97706" stroke-width="1"/>
    <rect x="22" y="-205" width="28" height="12" rx="4" fill="#FDE68A"/>
    <path d="M 20 -40 L 36 -10 L 52 -40 Z" fill="#94A3B8" stroke="#64748B" stroke-width="1"/>
    <path d="M 30 -40 L 36 -20 L 42 -40 Z" fill="#64748B"/>
    <path d="M 32 -20 L 36 -5 L 40 -20 Z" fill="#1E293B"/>
    <rect x="52" y="-190" width="8" height="60" rx="4" fill="#F59E0B" stroke="#D97706" stroke-width="1"/>
  </g>

  <g transform="translate(256, 256)" filter="url(#shadow)">
    <circle cx="80" cy="80" r="35" fill="#10B981" stroke="#059669" stroke-width="2"/>
    <path d="M 65 80 L 77 92 L 95 68" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
